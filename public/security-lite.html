<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OVMS Security Lite - Pos Keamanan Intranet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background-color: #0f172a; color: #ffffff; padding: 12px; font-size: 14px; }
    
    .header { text-align: center; padding: 12px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; margin-bottom: 12px; }
    .header h1 { font-size: 18px; font-weight: 800; color: #38bdf8; }
    .header p { font-size: 11px; color: #94a3b8; margin-top: 3px; }

    .card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 11px; font-weight: 700; color: #cbd5e1; margin-bottom: 4px; text-transform: uppercase; }
    .form-input { width: 100%; height: 44px; padding: 0 12px; background: #0f172a; border: 1.5px solid #475569; border-radius: 10px; color: #ffffff; font-size: 15px; font-weight: 700; outline: none; }
    .form-input:focus { border-color: #38bdf8; }

    .btn { width: 100%; height: 46px; border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 8px; }
    .btn-search { background: #0284c7; color: #ffffff; }
    .btn-checkout { background: #16a34a; color: #ffffff; height: 50px; font-size: 15px; }
    .btn-checkin { background: #2563eb; color: #ffffff; height: 50px; font-size: 15px; }

    .alert { padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; margin-bottom: 12px; display: none; word-break: break-all; }
    .alert-error { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; }
    .alert-success { background: #14532d; color: #86efac; border: 1px solid #22c55e; }

    .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
    .data-label { color: #94a3b8; font-size: 12px; font-weight: 600; }
    .data-val { color: #ffffff; font-size: 13px; font-weight: 700; text-align: right; }

    #scannedResult { display: none; }
  </style>
</head>
<body>

  <!-- Header Pos Security -->
  <div class="header">
    <h1>OVMS POS SECURITY</h1>
    <p>PEMINDAI TIKET ARMADA - PT WIDATRA BHAKTI</p>
  </div>

  <!-- Pesan Notifikasi Alert -->
  <div id="errorAlert" class="alert alert-error"></div>
  <div id="successAlert" class="alert alert-success"></div>

  <!-- Input Nama Petugas -->
  <div class="card">
    <div class="form-group" style="margin-bottom: 0;">
      <label>NAMA PETUGAS SECURITY JAGA:</label>
      <input type="text" id="guardNameInput" class="form-input" placeholder="Ketik Nama Anda (misal: Budi)" />
    </div>
  </div>

  <!-- Form Pencarian Tiket -->
  <div class="card">
    <div class="card-title">INPUT / PINDAI TIKET</div>
    
    <div class="form-group">
      <label>KODE TIKET / QR TOKEN:</label>
      <input type="text" id="tokenInput" class="form-input" placeholder="misal: 21 atau REQ-21" />
    </div>

    <button id="btnSearch" class="btn btn-search">
      🔍 CARI DETAIL TIKET
    </button>
  </div>

  <!-- Hasil Detail Tiket -->
  <div id="scannedResult" class="card">
    <div class="card-title">
      <span>DETAIL PERMINTAAN TIKET</span>
      <span id="reqBadge" style="color: #38bdf8; font-weight: 800;"></span>
    </div>

    <div class="data-row">
      <span class="data-label">Nama Pemohon:</span>
      <span id="reqEmployee" class="data-val">-</span>
    </div>
    <div class="data-row">
      <span class="data-label">Departemen:</span>
      <span id="reqDept" class="data-val">-</span>
    </div>
    <div class="data-row">
      <span class="data-label">Tujuan Perjalanan:</span>
      <span id="reqDest" class="data-val">-</span>
    </div>
    <div class="data-row">
      <span class="data-label">Mobil & Plat Nomor:</span>
      <span id="reqVehicle" class="data-val">-</span>
    </div>
    <div class="data-row">
      <span class="data-label">Nama Driver:</span>
      <span id="reqDriver" class="data-val">-</span>
    </div>
    <div class="data-row">
      <span class="data-label">Status Scan Keluar:</span>
      <span id="reqOutTime" class="data-val">-</span>
    </div>
    <div class="data-row">
      <span class="data-label">Status Scan Masuk:</span>
      <span id="reqInTime" class="data-val">-</span>
    </div>

    <div style="margin-top: 16px;">
      <div class="form-group">
        <label>CATATAN SECURITY (OPSIONAL):</label>
        <input type="text" id="securityNotes" class="form-input" placeholder="misal: Mobil bersih, KM 12500" />
      </div>

      <button id="btnCheckout" class="btn btn-checkout">
        🟢 SCAN KELUAR (BERANGKAT)
      </button>

      <button id="btnCheckin" class="btn btn-checkin">
        🔵 SCAN MASUK (KEMBALI)
      </button>
    </div>
  </div>

  <script>
    (function() {
      var API_BASE = window.location.origin + '/api';
      
      var guardInput = document.getElementById('guardNameInput');
      var tokenInput = document.getElementById('tokenInput');
      var btnSearch = document.getElementById('btnSearch');
      var resultCard = document.getElementById('scannedResult');
      
      var errorAlert = document.getElementById('errorAlert');
      var successAlert = document.getElementById('successAlert');

      var currentRequest = null;

      // Load saved guard name
      var savedGuard = localStorage.getItem('ovms_security_guard_name');
      if (savedGuard) guardInput.value = savedGuard;

      guardInput.addEventListener('change', function() {
        if (guardInput.value) {
          localStorage.setItem('ovms_security_guard_name', guardInput.value.trim());
        }
      });

      function showError(msg) {
        errorAlert.innerText = msg;
        errorAlert.style.display = 'block';
        successAlert.style.display = 'none';
      }

      function showSuccess(msg) {
        successAlert.innerText = msg;
        successAlert.style.display = 'block';
        errorAlert.style.display = 'none';
      }

      function hideAlerts() {
        errorAlert.style.display = 'none';
        successAlert.style.display = 'none';
      }

      function lookupToken(token) {
        if (!token) {
          showError('Silakan ketikkan kode tiket terlebih dahulu.');
          return;
        }

        hideAlerts();
        btnSearch.innerText = '⌛ MEMUAT DATA...';
        btnSearch.disabled = true;

        var cleanToken = token.trim();
        if (cleanToken.indexOf('token=') !== -1) {
          var parts = cleanToken.split('token=');
          if (parts[1]) cleanToken = parts[1].split('&')[0];
        }

        fetch(API_BASE + '/security/lookup?qr_code_token=' + encodeURIComponent(cleanToken))
          .then(function(res) { return res.json(); })
          .then(function(data) {
            btnSearch.innerText = '🔍 CARI DETAIL TIKET';
            btnSearch.disabled = false;

            if (data.status === 'success' && data.data) {
              currentRequest = data.data;
              renderDetail(data.data);
            } else {
              showError(data.message || 'Tiket tidak ditemukan di sistem.');
              resultCard.style.display = 'none';
            }
          })
          .catch(function(err) {
            btnSearch.innerText = '🔍 CARI DETAIL TIKET';
            btnSearch.disabled = false;
            showError('Gagal terhubung ke API server. Periksa koneksi jaringan.');
            resultCard.style.display = 'none';
          });
      }

      function renderDetail(req) {
        document.getElementById('reqBadge').innerText = '#REQ-' + req.id;
        document.getElementById('reqEmployee').innerText = req.employee || '-';
        document.getElementById('reqDept').innerText = req.department || '-';
        document.getElementById('reqDest').innerText = req.destination || '-';
        document.getElementById('reqVehicle').innerText = (req.vehicleModel || '-') + ' (' + (req.licensePlate || '-') + ')';
        document.getElementById('reqDriver').innerText = req.driverName || '-';
        document.getElementById('reqOutTime').innerText = req.security_checked_out_at || 'Belum Scan Keluar';
        document.getElementById('reqInTime').innerText = req.security_checked_in_at || 'Belum Scan Masuk';

        resultCard.style.display = 'block';
      }

      btnSearch.addEventListener('click', function() {
        lookupToken(tokenInput.value);
      });

      tokenInput.addEventListener('keypress', function(e) {
        if (e.keyCode === 13 || e.key === 'Enter') lookupToken(tokenInput.value);
      });

      function executeScan(type) {
        var guardName = guardInput.value.trim();
        if (!guardName) {
          showError('Nama Petugas Security Wajib Diisi!');
          guardInput.focus();
          return;
        }

        if (!currentRequest) return;

        var payload = {
          qr_code_token: currentRequest.qr_code_token || ('REQ-' + currentRequest.id),
          security_name: guardName,
          type: type,
          notes: document.getElementById('securityNotes').value.trim()
        };

        hideAlerts();

        fetch(API_BASE + '/security/scan', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(payload)
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.status === 'success') {
            showSuccess('✅ SUKSES: ' + data.message);
            document.getElementById('securityNotes').value = '';
            lookupToken(currentRequest.qr_code_token || ('REQ-' + currentRequest.id));
          } else {
            showError(data.message || 'Gagal memproses scan.');
          }
        })
        .catch(function(err) {
          showError('Gagal mengirim data ke server.');
        });
      }

      document.getElementById('btnCheckout').addEventListener('click', function() {
        executeScan('checkout');
      });

      document.getElementById('btnCheckin').addEventListener('click', function() {
        executeScan('checkin');
      });

    })();
  </script>
</body>
</html>
